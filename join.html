<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Become a Community Angel</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f7fb;
margin:0;
padding:0;
}

header{
background:#111827;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
padding:40px 20px;
}

form{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px 20px;
background:#1d4ed8;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

</style>

</head>

<body>

<header>
<h1>Become a Community Angel</h1>
<p>Join the community and help others</p>
</header>

<div class="container">

<form action="https://formspree.io/f/yourformid" method="POST">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Phone</label>
<input type="text" name="phone">

<label>Location</label>
<input type="text" name="location">

<label>How would you like to help?</label>
<textarea name="help" rows="4"></textarea>

<button type="submit">Join the Community</button>

</form>

</div>

</body>
</html>
