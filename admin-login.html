<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Admin Login | Without Helping Hands</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    .login-container {
      max-width: 500px;
      margin: 60px auto;
      padding: 30px;
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
    }

    .login-container h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .login-container p {
      text-align: center;
      margin-bottom: 25px;
    }

    .login-container label {
      display: block;
      margin-top: 15px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .login-container input {
      width: 100%;
      padding: 12px;
      border: 1px solid #999999;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .login-button {
      width: 100%;
      margin-top: 22px;
      padding: 13px;
      border: none;
      border-radius: 6px;
      background-color: #222222;
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    .login-button:hover {
      background-color: #444444;
    }

    .login-message {
      margin-top: 18px;
      text-align: center;
      font-weight: bold;
    }

    .return-link {
      display: block;
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="mission.html">Mission</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main class="container">

    <section class="login-container">

      <h1>Administrator Login</h1>

      <p>
        Authorized Without Helping Hands administrators only.
      </p>

      <form id="adminLoginForm">

        <label for="adminEmail">Email Address</label>

        <input
          type="email"
          id="adminEmail"
          required
          autocomplete="email"
        >

        <label for="adminPassword">Password</label>

        <input
          type="password"
          id="adminPassword"
          required
          autocomplete="current-password"
        >

        <button class="login-button" type="submit">
          Sign In
        </button>

      </form>

      <div class="login-message" id="loginMessage"></div>

      <a class="return-link" href="index.html">
        Return Home
      </a>

    </section>

  </main>

  <footer>
    <p>
      &copy; 2026 Without Helping Hands.
      All rights reserved.
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const projectUrl =
      "https://gwyrnafncezgbvdcpkgt.supabase.co";

    const publishableKey =
      "sb_publishable_yHG2Aag2o3NjePjJdgWNKQ_R13_CSL0";

    const adminLoginDatabase =
      window.supabase.createClient(
        projectUrl,
        publishableKey
      );

    const adminLoginForm =
      document.getElementById("adminLoginForm");

    const loginMessage =
      document.getElementById("loginMessage");

    adminLoginForm.addEventListener(
      "submit",
      async function (event) {
        event.preventDefault();

        loginMessage.textContent = "Signing in...";

        const email =
          document.getElementById("adminEmail").value;

        const password =
          document.getElementById("adminPassword").value;

        const { error } =
          await adminLoginDatabase.auth.signInWithPassword({
            email: email,
            password: password
          });

        if (error) {
          console.error(error);

          loginMessage.textContent =
            "The email or password was incorrect.";

          return;
        }

        loginMessage.textContent =
          "Login successful. Opening dashboard...";

        window.location.href = "admin.html";
      }
    );

    async function checkExistingLogin() {
      const { data } =
        await adminLoginDatabase.auth.getSession();

      if (data.session) {
        window.location.href = "admin.html";
      }
    }

    checkExistingLogin();
  </script>

</body>
</html>
