<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 0 10px rgba(0,0,0,.1);
    }

    h2 {
      text-align: center;
      color: #2c7a4b;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2c7a4b;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #24653e;
    }

    #message {
      margin-top: 15px;
      text-align: center;
      color: green;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Reset Your Password</h2>

  <input
    type="password"
    id="password"
    placeholder="Enter New Password"
  >

  <button onclick="updatePassword()">
    Update Password
  </button>

  <p id="message"></p>
</div>

<script>

const supabaseURl =
  "https://gwyrnafncezgbvdcpkgt.supabase.co";

const supabaseKey =
  "sb_publishable_yHG2Aag2o3NjePjJdgWNKQ_R13_CSL0";

const supabase = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function updatePassword() {

  const password =
    document.getElementById("password").value;

  const { error } =
    await supabase.auth.updateUser({
      password: password
    });

  if (error) {
    document.getElementById("message").innerHTML =
      error.message;
  } else {

    document.getElementById("message").innerHTML =
      "Password updated successfully!";

    setTimeout(() => {
      window.location.href = "admin-login.html"; 
    }, 2000);

  }
}
</script>

</body>
</html>
